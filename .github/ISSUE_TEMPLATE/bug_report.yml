name: Bug Report
description: Report a problem with Claude Agent Builder
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I asked the agent builder to create X, it generated Y instead of Z..."
    validations:
      required: true
  - type: textarea
    id: prompt
    attributes:
      label: Prompt used
      description: What did you say to Claude Code that triggered the issue?
      placeholder: "Build me an agent that..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Generated output
      description: Paste the agent files or error messages that were generated.
      render: markdown
  - type: dropdown
    id: install
    attributes:
      label: Installation type
      options:
        - User-level (~/.claude/skills/)
        - Project-level (.claude/skills/)
    validations:
      required: true
