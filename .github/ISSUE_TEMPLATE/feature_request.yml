name: Feature Request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for making Agent Builder better? We'd love to hear it!
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
      placeholder: "I often need to build agents that... but the current tool doesn't..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core skill (SKILL.md)
        - Architecture patterns
        - Primitives guide
        - Validation script
        - Scaffold script
        - Examples
        - Documentation
        - Other
    validations:
      required: true
